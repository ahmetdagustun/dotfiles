# --- Better Prefix ---
# Remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# --- Enable Mouse Support ---
set -g mouse on

# --- NEW: Intuitive Pane Splitting ---
# 's' for side-by-side split
bind s split-window -h -c "#{pane_current_path}"
# 'v' for vertical split (top-and-bottom)
bind v split-window -v -c "#{pane_current_path}"

# --- NEW: Vim-style Pane Navigation ---
# (Now that 'h' is free)
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# --- Quality of Life ---
# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Reload config easily
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# --- Plugin Manager (TPM) ---
# This is the "Homebrew" for tmux
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# --- NEW: Your Theme (Gruvbox!) ---
# This plugin makes your status bar look amazing
set -g @plugin 'egel/tmux-gruvbox'
set -g @egel/tmux-gruvbox 'dark' # or 'light'

# Initialize TPM (must be at the very bottom)
run '~/.tmux/plugins/tpm/tpm'

# 1. Enable passthrough
set -g allow-passthrough on

# 2. Pass through the terminal variables (Critical for Fastfetch)
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# 3. (Optional) Fix colors while you're here
set -as terminal-features ",xterm-ghostty:RGB"